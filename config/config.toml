##############################################
# Stalwart Mail Server – SMTP Relay Konfiguration
# Dokumentation: https://stalw.art/docs
##############################################

[server]
hostname = "%{env:MAIL_HOSTNAME|mail.example.com}%"
default-timezone = "Europe/Berlin"

# ──────────────────────────────────────────
# Listener
# ──────────────────────────────────────────

[server.listener."smtp"]
bind = ["0.0.0.0:25"]
protocol = "smtp"

[server.listener."submission"]
bind = ["0.0.0.0:587"]
protocol = "smtp"
tls.implicit = false        # STARTTLS
tls.required = true

[server.listener."smtps"]
bind = ["0.0.0.0:465"]
protocol = "smtp"
tls.implicit = true         # Direktes TLS

[server.listener."http"]
bind = ["0.0.0.0:8080"]
protocol = "http"           # Web Admin

# ──────────────────────────────────────────
# TLS / Zertifikate
# ──────────────────────────────────────────

[certificate."default"]
cert = "%{file:/opt/stalwart-mail/etc/tls/tls.crt}%"
private-key = "%{file:/opt/stalwart-mail/etc/tls/tls.key}%"
# Für lokale Entwicklung: self-signed wird automatisch generiert wenn leer
# Für Produktion: Let's Encrypt Pfad eintragen

[acme."letsencrypt"]
directory = "https://acme-v02.api.letsencrypt.org/directory"
# Für Staging (Test): https://acme-staging-v02.api.letsencrypt.org/directory
challenge = "tls-alpn-01"
contact = ["mailto:admin@example.com"]
domains = ["%{env:MAIL_HOSTNAME|mail.example.com}%"]
default = true

# ──────────────────────────────────────────
# SMTP Relay Einstellungen
# ──────────────────────────────────────────

[session.ehlo]
reject-non-fqdn = false            # Für interne Dienste auf false setzen

[session.rcpt]
relay = [{if = "!is_empty(authenticated_as)", then = true}, {else = false}]

[session.data.limits]
messages = 5
size = 26214400     # 25 MB max. Nachrichtengröße

# ──────────────────────────────────────────
# Queue / Zustellung
# ──────────────────────────────────────────

[queue.outbound]
next-hop = [{if = "!is_empty(env.SMTP_SMARTHOST)", then = "'%{env:SMTP_SMARTHOST}%'"},
            {else = "false"}]
# Wenn SMTP_SMARTHOST gesetzt → weiterleiten (Smarthost)
# Wenn nicht gesetzt → direkte MX Zustellung

[queue.retry]
schedule = ["2m", "5m", "10m", "15m", "30m", "1h", "2h", "4h", "8h"]

[queue.expire]
soft = "3d"     # Soft-Bounce nach 3 Tagen
hard = "5d"     # Hard-Bounce / Aufgabe nach 5 Tagen

# ──────────────────────────────────────────
# Authentifizierung (für Port 587/465)
# ──────────────────────────────────────────

[auth.dkim]
verify = "relaxed"  # DKIM Validierung bei eingehenden Mails
sign = ["rsa"]      # DKIM Signatur bei ausgehenden Mails

[auth.spf.ehlo]
verify = "relaxed"

[auth.spf.mail-from]
verify = "relaxed"

# Interne User-Datenbank (SQLite – leichtgewichtig für Relay)
[store."internal"]
type = "sqlite"
path = "/opt/stalwart-mail/data/index.sqlite3"

[directory."internal"]
type = "internal"
store = "internal"

[authentication.fallback-admin]
user = "admin"
secret = "%{env:ADMIN_SECRET|changeme}%"   # Über .env setzen!

# ──────────────────────────────────────────
# Speicher
# ──────────────────────────────────────────

[store."db"]
type = "sqlite"
path = "/opt/stalwart-mail/data/stalwart.sqlite3"

[storage]
data = "db"
fts = "db"
lookup = "db"
blob = "db"
directory = "internal"

# ──────────────────────────────────────────
# Logs
# ──────────────────────────────────────────

[tracer."stdout"]
type = "stdout"
level = "info"                  # debug | info | warn | error
ansi = false
enable = true
